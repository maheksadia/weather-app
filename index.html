<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skyla — Weather App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="app-wrapper">
      <header class="app-header">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">Skyla</span>
        </div>
        <p class="tagline">Real-time weather, anywhere on Earth.</p>
      </header>

      <section class="search-section">
        <div class="search-box">
          <input type="text" id="cityInput" class="search-input" placeholder="Search city — e.g. Bengaluru, Tokyo..." autocomplete="off" />
          <button id="searchBtn" class="search-btn" aria-label="Search">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
        <p id="errorMsg" class="error-msg" role="alert" aria-live="polite"></p>
      </section>

      <main id="mainContent">
        <div id="loader" class="loader hidden" aria-label="Loading weather data">
          <div class="spinner"></div>
          <p class="loader-text">Fetching weather data…</p>
        </div>

        <div id="weatherCard" class="weather-card hidden">
          <div class="card-top">
            <div class="city-info">
              <h1 id="cityName" class="city-name"></h1>
              <p id="countryName" class="country-name"></p>
            </div>
            <p id="currentDate" class="current-date"></p>
          </div>
          <div class="card-middle">
            <div class="temp-block">
              <span id="temperature" class="temperature"></span>
              <span class="temp-unit">°C</span>
            </div>
            <div class="icon-block">
              <img id="weatherIcon" class="weather-icon" src="" alt="Weather icon" />
              <p id="weatherDesc" class="weather-desc"></p>
            </div>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-icon">💧</span>
              <div>
                <p class="stat-label">Humidity</p>
                <p id="humidity" class="stat-value"></p>
              </div>
            </div>
            <div class="stat-card">
              <span class="stat-icon">🌬️</span>
              <div>
                <p class="stat-label">Wind Speed</p>
                <p id="windSpeed" class="stat-value"></p>
              </div>
            </div>
            <div class="stat-card">
              <span class="stat-icon">🌡️</span>
              <div>
                <p class="stat-label">Feels Like</p>
                <p id="feelsLike" class="stat-value"></p>
              </div>
            </div>
            <div class="stat-card">
              <span class="stat-icon">👁️</span>
              <div>
                <p class="stat-label">Visibility</p>
                <p id="visibility" class="stat-value"></p>
              </div>
            </div>
          </div>
        </div>

        <div id="emptyState" class="empty-state">
          <div class="empty-icon">🌍</div>
          <p class="empty-title">Search for any city</p>
          <p class="empty-sub">Type a city name above and press Enter or click Search.</p>
        </div>
      </main>

      <footer class="app-footer">
        <p>Powered by <a href="https://openweathermap.org/" target="_blank" rel="noopener">OpenWeatherMap</a> · Built for portfolio</p>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
